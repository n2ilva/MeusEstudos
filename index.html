<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora TypeScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculadora">
    <h1>Calculadora</h1>
    
    <div id="display-container">
        <p id="resultado">0</p>
    </div>

    <div class="grade-botoes">
        <!-- Linha 1 -->
        <button class="limpar">C</button>
        <button>/</button>
        <button>*</button>
        
        <!-- Linha 2 -->
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>-</button>
        
        <!-- Linha 3 -->
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>+</button>
        
        <!-- Linha 4 -->
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>.</button> 

        <!-- Linha 5 -->
        <button>0</button>
        <button class="igual">=</button>
    </div>
</div>

<script src="manupulacaoDOM.js"></script> <!-- Mudei para .js para funcionar no navegador -->

</body>
</html>
